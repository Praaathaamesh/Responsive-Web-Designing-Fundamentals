<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="cube">
    </section>
    
    <section>
        <h2>Payment Information</h2>
        <form action="">
            <input required type="text" id="card-name" name="card-name">
            <label for="card-name"><span aria-hidden="true">*</span>Card Name:</label>
            <input aria-describedby="card-number-help" required type="text" id="card-number" name="card-number">
            <p id="card-number-help">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Delectus reiciendis expedita ullam magnam odio accusantium doloremque, magni voluptatum aut tenetur quisquam reprehenderit est provident, quibusdam ab! Aperiam neque nisi doloremque?</p>
            <label for="card-number"><span aria-hidden="true">*</span>Card Number:</label>
        </form>
    </section>
</body>

</html>
