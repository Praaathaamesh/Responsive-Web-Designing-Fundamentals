<!DOCTYPE html>
<html lang="en">

<head>

</head>

            </ul>
        </li>
        <li>
            <input type="checkbox" id="backend">

                <li><a class="sub-item-link" target="_blank" href="https://www.youtube.com/brocode">sdc</a></li>
            </ul>
            
        </li>
        <li>
            <input type="checkbox" id="frontend">
            <label for="frontend">Frontend-Developer</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.youtube.com/brocode">C#a</a></li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="tester">
            <label for="tester">Software Tester</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.youtube.com/brocode">C#a</a></li>
            </ul>
        </li>
    </ul>

</html>
