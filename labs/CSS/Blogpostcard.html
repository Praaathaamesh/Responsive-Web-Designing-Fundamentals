<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="Blogpostcard_style.css">
</head>
<body>
    <div class="blog-post-card">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="post-img"
        class="post-img">
        <div class="post-content">
            <h2 class="post-title">My big dingus</h2>
            <p class="post-excerpt">this is a bigg ahh dingus</p>
            <a class="read-more" href="https://www.google.com">Read More</a>
        </div>
    </div>
</body>
</html>
